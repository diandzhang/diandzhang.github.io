<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>IPTV 高级工具 - 转换/过滤/生成</title>
  <style>
    body { font-family: 'Segoe UI', Arial; background: #eee; margin: 0; padding: 10px; font-size: 13px; overflow: hidden; height: 100vh; }
    h2 { margin: 2px 0; font-size: 16px; display: inline-block; }
    .filter-bar { background: #fff3e0; padding: 5px 10px; margin-bottom: 5px; display: flex; align-items: center; border-radius: 4px; border: 1px solid #ffcc80; }
    .filter-bar select { padding: 3px; margin-right: 5px; cursor: pointer; border-radius: 3px; }
    .filter-bar input { flex: 1; padding: 4px; border: 1px solid #ccc; border-radius: 3px; }
    .tabs { display: flex; justify-content: center; margin-bottom: 5px; }
    .tab-btn { padding: 6px 20px; cursor: pointer; border: 1px solid #ccc; background: #ddd; border-bottom: none; border-radius: 4px 4px 0 0; }
    .tab-btn.active { background: #4CAF50; color: white; border-color: #4CAF50; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 8px; border-radius: 5px; display: none; height: 80vh; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .container.active { display: block; }
    textarea { width: 100%; height: calc(42% - 15px); box-sizing: border-box; margin-top: 5px; font-family: 'Consolas', monospace; font-size: 11px; resize: none; border: 1px solid #ddd; }
    .btn-group { margin: 4px 0; display: flex; gap: 8px; justify-content: center; align-items: center; }
    button { padding: 5px 15px; cursor: pointer; border-radius: 3px; border: none; background: #4CAF50; color: white; font-weight: bold; }
    .secondary { background: #2196F3; } .danger { background: #f44336; }
    .gen-input { padding: 4px; border: 1px solid #ccc; width: 60px; border-radius: 3px; }
    #stats { font-size: 11px; color: #666; text-align: right; }
  </style>
</head>
<body>

  <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 5px;">
    <h2>📡 IPTV 综合处理中心</h2>
    <div id="stats">准备就绪</div>
  </div>

  <div class="filter-bar">
    <select id="filterMode">
      <option value="exclude">🚫 排除 (黑名单)</option>
      <option value="include">✅ 包含 (白名单)</option>
    </select>
    <input type="text" id="filterKeywords" placeholder="过滤关键字 (多个用逗号隔开)">
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('txt2m3u')">TXT -> M3U</button>
    <button class="tab-btn" onclick="switchTab('m3u2txt')">M3U -> TXT</button>
    <button class="tab-btn" onclick="switchTab('generator')" style="background:#673AB7; color:white;">⚡ 批量生成地址</button>
  </div>

  <div id="tab-txt2m3u" class="container active">
    <textarea id="txtInput" placeholder="频道名,url"></textarea>
    <div class="btn-group"><button onclick="doConvert('txt2m3u')">开始转换</button><button class="danger" onclick="clearTxt('txtInput')">清空</button></div>
    <textarea id="m3uOutput" readonly></textarea>
    <div class="btn-group"><button class="secondary" onclick="copyIt('m3uOutput')">拷贝</button><button class="secondary" onclick="saveFile('m3uOutput', 'list.m3u')">保存</button></div>
  </div>

  <div id="tab-m3u2txt" class="container">
    <div style="margin-bottom:5px;"><input type="file" accept=".m3u,.m3u8" onchange="loadFile(this, 'm3uInput')"></div>
    <textarea id="m3uInput" placeholder="粘贴 M3U 内容..."></textarea>
    <div class="btn-group"><button onclick="doConvert('m3u2txt')">开始转换</button><button class="danger" onclick="clearTxt('m3uInput')">清空</button></div>
    <textarea id="txtOutput" readonly></textarea>
    <div class="btn-group"><button class="secondary" onclick="copyIt('txtOutput')">拷贝</button><button class="secondary" onclick="saveFile('txtOutput', 'list.txt')">保存</button></div>
  </div>

  <div id="tab-generator" class="container">
    <div style="background: #f9f9f9; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        <p style="margin:0 0 10px 0;"><b>模板说明：</b>使用 <code>[ID]</code> 作为序号占位符</p>
        <div class="btn-group" style="justify-content: flex-start;">
            标题: <input type="text" id="genTitle" value="未知台" class="gen-input" style="width:80px;">
            范围: <input type="number" id="genStart" value="0" class="gen-input"> 到 
            <input type="number" id="genEnd" value="100" class="gen-input">
        </div>
        <div style="margin-top:10px;">
            地址模板: <input type="text" id="genTpl" style="width:70%; padding:4px;" value="http://XXX.XXX.XXX.XXX:3333/hls/[ID]/index.m3u8">
            <button onclick="generateUrls()" style="background:#673AB7;">点击生成</button>
        </div>
    </div>
    <textarea id="genOutput" style="height: calc(70% - 15px);" placeholder="生成的 TXT 格式列表..."></textarea>
    <div class="btn-group">
        <button class="secondary" onclick="copyIt('genOutput')">拷贝结果</button>
        <button class="secondary" onclick="saveFile('genOutput', 'generated_scan.txt')">保存为待测列表</button>
    </div>
  </div>

  <script>
    function switchTab(t) {
      document.querySelectorAll('.container, .tab-btn').forEach(e => e.classList.remove('active'));
      document.getElementById(`tab-${t}`).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // 核心逻辑：生成 IPTV 地址
    function generateUrls() {
        const title = document.getElementById('genTitle').value;
        const start = parseInt(document.getElementById('genStart').value);
        const end = parseInt(document.getElementById('genEnd').value);
        const tpl = document.getElementById('genTpl').value;
        
        if (isNaN(start) || isNaN(end) || !tpl.includes('[ID]')) {
            alert("请确保范围是数字，且模板包含 [ID]");
            return;
        }

        let res = "";
        let count = 0;
        for (let i = start; i <= end; i++) {
            const url = tpl.replace('[ID]', i);
            res += `${title}_${i},${url}\n`;
            count++;
        }
        document.getElementById('genOutput').value = res;
        document.getElementById('stats').innerText = `⚡ 已生成 ${count} 条地址`;
    }

    function shouldPass(url, keywords, mode) {
      if (keywords.length === 0) return true;
      const hit = keywords.some(k => url.includes(k));
      return mode === 'exclude' ? !hit : hit;
    }

    function doConvert(type) {
      const mode = document.getElementById('filterMode').value;
      const keywords = document.getElementById('filterKeywords').value.split(',').map(k => k.trim()).filter(k => k);
      let count = 0, skip = 0;

      if (type === 'txt2m3u') {
        const input = document.getElementById('txtInput').value;
        let out = '#EXTM3U\n';
        input.split('\n').forEach(line => {
          if (line.includes(',') && !line.includes('#genre#')) {
            const [name, url] = line.split(',');
            if (url && shouldPass(url, keywords, mode)) {
              out += `#EXTINF:-1,${name.trim()}\n${url.trim()}\n`;
              count++;
            } else { skip++; }
          }
        });
        document.getElementById('m3uOutput').value = out;
      } else {
        const input = document.getElementById('m3uInput').value;
        let out = '', tempName = '', curGrp = '未分类', lastGrp = '';
        input.split('\n').forEach(line => {
          line = line.trim();
          if (line.startsWith('#EXTINF:')) {
            const g = line.match(/group-title="([^"]*)"/);
            curGrp = g ? g[1] : '未分类';
            tempName = line.split(',').pop();
          } else if (line.startsWith('http')) {
            if (shouldPass(line, keywords, mode)) {
              if (curGrp !== lastGrp) { out += `${curGrp},#genre#\n`; lastGrp = curGrp; }
              out += `${tempName},${line}\n`;
              count++;
            } else { skip++; }
          }
        });
        document.getElementById('txtOutput').value = out;
      }
      document.getElementById('stats').innerText = `✅ 完成: ${count} | ⏭️ 跳过: ${skip}`;
    }

    function loadFile(i, targetId) {
      const r = new FileReader();
      r.onload = e => { document.getElementById(targetId).value = e.target.result; };
      r.readAsText(i.files[0]);
    }
    function copyIt(id) { document.getElementById(id).select(); document.execCommand('copy'); }
    function clearTxt(id) { document.getElementById(id).value = ''; }
    function saveFile(id, n) {
      const b = new Blob([document.getElementById(id).value], {type:'text/plain'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = n; a.click();
    }
  </script>
</body>
</html>
